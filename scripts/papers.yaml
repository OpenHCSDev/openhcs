# Unified metadata for all TOPLAS papers
# Single source of truth for paper structure and build requirements
# OpenHCS Way: Declarative configuration, fail-loud validation, orthogonal design
#
# STRUCTURAL INVARIANTS:
# 1. Content location: <paper_dir>/latex/content/*.tex (auto-discovered)
# 2. Proofs location: <paper_dir>/proofs/*.lean (auto-discovered)
# 3. Releases location: <paper_dir>/releases/{pdf, md, BUILD_LOG.txt, tar.gz}
#
# Content files and Lean proof statistics are auto-discovered by build_papers.py.
#
# Optional per-paper fields:
#   proofs_dir: "proofs"                      # override proofs directory name
#   archive_prefix: "paper4_toc"              # controls arXiv package/archive basename
#   assumption_ledger_sources:                # relative paths under proofs_dir
#     - "DecisionQuotient/ClaimClosure.lean"
#   claim_mapping_file: "content/11_lean_proofs.tex"   # coverage appendix file
#   arxiv_comments: "Submitted to ... (X pages)."       # overrides auto-generated arXiv comments line
#   scaffold_from: "paper4_toc"               # derive scaffold content from another paper id

# arXiv Packaging Configuration
arxiv:
  include_build_log: true          # BUILD_LOG.txt with actual lake output
  include_lean_source: true        # All .lean source files
  include_build_config: true       # lakefile.lean, lean-toolchain, lake-manifest.json
  exclude_patterns:
    - ".lake"                       # Build cache
    - "build"                       # Compiled output
    - "*.olean"                     # Compiled Lean objects
    - "*.ilean"                     # Intermediate Lean files

papers:
  paper1:
    name: "Typing Discipline"
    full_name: "Impossibility Theorems for Fixed-Axis Classification Systems: With Application to Type Theory"
    dir: "paper1_typing_discipline"
    latex_dir: "latex"
    latex_file: "main.tex"
    venue: "TOPLAS"

  paper1_jsait:
    name: "Classification Theory (JSAIT)"
    full_name: "Identification Capacity and Rate-Query Tradeoffs in Classification Systems"
    dir: "paper1_typing_discipline"
    latex_dir: "latex_jsait"
    latex_file: "type_compression_jsait.tex"
    venue: "JSAIT"
    claim_mapping_file: "content/claim_mapping_auto.tex"
    # Review submission format: pdflatex flag triggers single-column double-spaced
    submission_format:
      latex_flag: "\\JSAITREVIEW"
      description: "JSAIT review: single column, double spaced, 12pt, 1in margins"

  paper2:
    name: "SSOT Foundations"
    full_name: "Formal Foundations for the Single Source of Truth Principle: A Language Design Specification Derived from Epistemic Coherence"
    dir: "paper2_ssot"
    latex_dir: "latex"
    latex_file: "main.tex"
    venue: "Draft"

  paper2_it:
    name: "Coherence Theory (IT)"
    full_name: "Zero-Incoherence Capacity of Interactive Encoding Systems: Achievability, Converse, and Side Information Bounds"
    dir: "paper2_ssot"
    latex_dir: "latex_it"
    latex_file: "coherence_it.tex"
    venue: "IEEE Transactions on Information Theory"
    assumption_ledger_sources:
      - "Ssot/ClaimClosure.lean"
    claim_mapping_file: "content/11_lean_proofs.tex"

  paper3:
    name: "Leverage Framework"
    full_name: "Leverage-Driven Software Architecture: A Probabilistic Framework for Architectural Decision-Making"
    dir: "paper3_leverage"
    latex_dir: "latex"
    latex_file: "leverage_arxiv.tex"
    venue: "Draft"

  paper4:
    name: "Decision Quotient"
    full_name: "Verified Polynomial-Time Reductions in Lean 4: Formalizing the Complexity of Decision-Relevant Information"
    dir: "paper4_decision_quotient"
    latex_dir: "latex"
    latex_file: "decision_quotient_arxiv.tex"
    venue: "Draft"
    assumption_ledger_sources:
      - "DecisionQuotient/ClaimClosure.lean"
    claim_mapping_file: "content/claim_mapping_auto.tex"

  paper4_toc:
    name: "Decision Quotient (ToC)"
    full_name: "Computational Complexity of Information Sufficiency"
    dir: "paper4_decision_quotient"
    latex_dir: "latex_toc"
    latex_file: "decision_quotient_toc.tex"
    venue: "Theory of Computing"
    assumption_ledger_sources:
      - "DecisionQuotient/ClaimClosure.lean"
    claim_mapping_file: "content/claim_mapping_auto.tex"

  paper5:
    name: "Credibility"
    full_name: "A Formal Theory of Credibility: Why Assertions of Trustworthiness Decrease Trust"
    dir: "paper5_credibility"
    latex_dir: "latex"
    latex_file: "credibility_arxiv.tex"
    venue: "Draft"

  paper6:
    name: "Formality Universality"
    full_name: "Formality as Universality: A Type Theory of Argument Epistemology"
    dir: "paper6_formality_universality"
    latex_dir: "latex"
    latex_file: "formality_arxiv.tex"
    venue: "Draft"
