<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proof Integrity Graph Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; }
    #root { width: 100%; min-height: 100vh; }
    a, code { color: #9ae6b4; }
  </style>
</head>
<body>
  <div id="root">Loading viewer…</div>

  <script>
    const SOURCE_ROOT_VIEWER = /\/docs\/papers\/graph_infra\/viewer\.html$/.test(window.location.pathname);
    if (SOURCE_ROOT_VIEWER) {
      window.location.replace(`./graphs/viewer.html${window.location.search}${window.location.hash}`);
    }

    // Viewer bootstrap loader
    // Strategy:
    // 1) Load runtime libraries from CDN.
    // 2) Derive the runnable viewer from the source-of-truth JS modules.
    // 3) If runtime resources are unavailable, show a clear failure message.
    //
    // Source of truth:
    // - true_path.js
    // - graph_utils.js
    // - latex_renderer.js
    // - dependency-graph.jsx
    //
    // We derive the runnable viewer from those sources in-browser. `viewer.js`
    // is intentionally not the source of truth because it can drift stale.

    const CDN = {
      react: 'https://unpkg.com/react@18/umd/react.production.min.js',
      reactdom: 'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
      babel: 'https://unpkg.com/@babel/standalone/babel.min.js',
      d3: 'https://unpkg.com/d3@7',
      katex_css: 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css',
      katex: 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js'
    };
    const LOCAL_BUST = String(Date.now());

    function loadScript(url, { asModule = false } = {}) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = url;
        if (asModule) s.type = 'module';
        s.onload = () => resolve(url);
        s.onerror = (e) => reject(new Error('Failed to load ' + url));
        document.head.appendChild(s);
      });
    }

    async function loadText(url) {
      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('Failed to fetch ' + url + ' (' + resp.status + ')');
        return await resp.text();
      } catch (_fetchErr) {
        return await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', url, true);
          xhr.onload = () => {
            if (xhr.status === 0 || (xhr.status >= 200 && xhr.status < 300)) {
              resolve(xhr.responseText);
            } else {
              reject(new Error('Failed to load ' + url + ' (' + xhr.status + ')'));
            }
          };
          xhr.onerror = () => reject(new Error('Failed to load ' + url));
          xhr.send();
        });
      }
    }

    function flattenModuleSource(code) {
      return code
        // Remove ESM imports; we concatenate in dependency order.
        .replace(/^\s*import\s+[^;]+;\s*$/gm, '')
        // Remove re-export blocks such as `export {{ ... }} from "./x";`
        .replace(/export\s*\{[\s\S]*?\}\s*from\s*['"][^'"]+['"];\s*/g, '')
        // Remove bare export lists such as `export {{ ... }};`
        .replace(/^\s*export\s*\{[\s\S]*?\};?\s*$/gm, '')
        // Convert exported declarations into plain declarations.
        .replace(/\bexport\s+default\s+/g, '')
        .replace(/\bexport\s+(?=(const|function|class)\b)/g, '');
    }

    function stripReExportBlocks(code) {
      return code
        .replace(/export\s*\{[\s\S]*?\}\s*from\s*['"][^'"]+['"];\s*/g, '')
        .replace(/^\s*export\s*\{[\s\S]*?\};?\s*$/gm, '');
    }

    function wrapTruePathModule(code) {
      const body = flattenModuleSource(code);
      return `
(function () {
${body}
  window.__graphViewer = window.__graphViewer || {};
  window.__graphViewer.truePath = {
    identifyInvariants,
    shortestPath,
    shortestPathThroughInvariants,
    computeAllTruePaths,
    detectCycles,
    classifyCycleTriviality,
    computeNontrivialityScore,
    validateTruePaths,
    generateValidationReport,
    TRUE_PATH_FILTERS,
  };
})();`;
    }

    function wrapGraphUtilsModule(code) {
      const body = flattenModuleSource(stripReExportBlocks(code));
      return `
(function () {
  window.__graphViewer = window.__graphViewer || {};
  const {
    identifyInvariants,
    shortestPath,
    shortestPathThroughInvariants,
    computeAllTruePaths,
    detectCycles,
    classifyCycleTriviality,
    computeNontrivialityScore,
    validateTruePaths,
    generateValidationReport,
    TRUE_PATH_FILTERS,
  } = window.__graphViewer.truePath;
${body}
  window.__graphViewer.graphUtils = {
    computeStats,
    isArtifact,
    buildAdj,
    findRoots,
    bfs,
    FILTERS,
    applyFilters,
    identifyInvariants,
    validateTruePaths,
    detectCycles,
    distancesFromRoots,
    findAllPaths,
    findShortestPath,
    generateValidationReport,
  };
})();`;
    }

    function wrapLatexRendererModule(code) {
      const body = flattenModuleSource(code);
      return `
(function () {
  window.__graphViewer = window.__graphViewer || {};
${body}
  window.__graphViewer.latex = {
    leanToLatex,
    extractLatex,
    renderLatex,
    renderLatexInline,
    formatLeanSignature,
    FOUNDATION_BUCKETS,
    classifyFoundationBucket,
    computeFoundationBuckets,
  };
})();`;
    }

    function transformDependencyGraphModule(code) {
      const withoutReactImport = code
        .replace(/^\s*import\s+\{\s*useState,\s*useEffect,\s*useRef,\s*useCallback,\s*useMemo\s*\}\s+from\s+["']react["'];\s*$/m, '')
        .replace(/^\s*import\s+\*\s+as\s+d3\s+from\s+["']d3["'];\s*$/m, '')
        .replace(
          /^\s*import\s+\{[^}]*\}\s+from\s+["']\.\/graph_utils["'];\s*$/m,
          'const { computeStats, isArtifact, buildAdj, findRoots, bfs, FILTERS, applyFilters, shortestPath, validateTruePaths, distancesFromRoots, findAllPaths, generateValidationReport } = window.__graphViewer.graphUtils;'
        )
        .replace(
          /^\s*import\s+\{[^}]*\}\s+from\s+["']\.\/latex_renderer["'];\s*$/m,
          'const { FOUNDATION_BUCKETS, extractLatex, renderLatex, formatLeanSignature } = window.__graphViewer.latex;'
        );

      return flattenModuleSource(withoutReactImport);
    }

    async function buildDerivedViewerSource() {
      const [truePathCode, graphUtilsCode, latexCode, viewerCode] = await Promise.all([
        loadText(`true_path.js?v=${LOCAL_BUST}`),
        loadText(`graph_utils.js?v=${LOCAL_BUST}`),
        loadText(`latex_renderer.js?v=${LOCAL_BUST}`),
        loadText(`dependency-graph.jsx?v=${LOCAL_BUST}`),
      ]);
      const prelude = `
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const d3 = window.d3;
`;
      const renderFooter = `
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(DependencyGraphViewer));
`;

      return [
        prelude,
        wrapTruePathModule(truePathCode),
        wrapGraphUtilsModule(graphUtilsCode),
        wrapLatexRendererModule(latexCode),
        transformDependencyGraphModule(viewerCode),
        renderFooter,
      ].join('\n\n');
    }

    function loadLink(url) {
      return new Promise((resolve, reject) => {
        const l = document.createElement('link');
        l.rel = 'stylesheet';
        l.href = url;
        l.onload = () => resolve(url);
        l.onerror = () => reject(new Error('Failed to load ' + url));
        document.head.appendChild(l);
      });
    }

    async function tryLoad(name) {
      const isCss = name === 'katex_css';
      const cdnUrl = CDN[name];
      try {
        if (isCss) await loadLink(cdnUrl); else await loadScript(cdnUrl);
        return { ok: true, url: cdnUrl };
      } catch (_firstErr) {
        return { ok: false };
      }
    }

    async function boot() {
      const root = document.getElementById('root');
      root.innerHTML = 'Loading runtime resources...';
      const resources = ['react', 'reactdom', 'd3', 'babel', 'katex_css', 'katex'];
      const results = {};
      for (const r of resources) {
        results[r] = await tryLoad(r);
      }

      // Wait a tick for globals to settle
      await new Promise((r) => setTimeout(r, 80));

      if (typeof React === 'undefined' || typeof ReactDOM === 'undefined' || typeof d3 === 'undefined') {
        root.innerHTML = `
          <div style="padding:20px;color:#eee;background:#111;border-radius:6px;max-width:900px;margin:20px;">
            <h3 style="margin-bottom:8px;color:#fff">Resources unavailable</h3>
            <p>The viewer requires React, ReactDOM and D3 from the configured CDN endpoints. One or more of those resources failed to load.</p>
            <p>Options:</p>
            <ol>
              <li>Allow CDN access for <code>unpkg.com</code> and <code>cdn.jsdelivr.net</code>.</li>
              <li>Or use a packaged paper viewer generated by <code>python3 scripts/build_papers.py arxiv &lt;paper_id&gt;</code>.</li>
              <li>If you only need a standalone paper viewer, open a packaged paper's <code>graphs/index.html</code> generated by <code>python3 scripts/build_papers.py arxiv &lt;paper_id&gt;</code>.</li>
            </ol>
          </div>`;
        return;
      }

      if (typeof Babel === 'undefined') {
        root.innerHTML = `
          <div style="padding:20px;color:#eee;background:#111;border-radius:6px;max-width:900px;margin:20px;">
            <h3 style="margin-bottom:8px;color:#fff">Babel unavailable</h3>
            <p>The local viewer is derived from <code>true_path.js</code>, <code>graph_utils.js</code>, <code>latex_renderer.js</code>, and <code>dependency-graph.jsx</code>. Because that source includes JSX, it requires <code>@babel/standalone</code> from the CDN path.</p>
            <p>Next steps:</p>
            <ol>
              <li>Allow CDN access for <code>https://unpkg.com/@babel/standalone/babel.min.js</code>.</li>
              <li>Or use the packaged paper viewer, which does not require in-browser Babel.</li>
            </ol>
          </div>`;
        return;
      }

      // At this point we have Babel+React+d3. Derive the viewer from the
      // modular source files and transpile that combined source locally.
      root.innerHTML = 'Loading source modules and deriving the viewer locally...';
      try {
        const code = await buildDerivedViewerSource();
        const transformed = Babel.transform(code, { presets: ['react'] }).code;
        (0, eval)(transformed);
      } catch (err) {
        root.innerHTML = '<pre style="color:red;background:#1a0000;padding:20px;">' + (err.stack || err.message) + '</pre>';
      }
    }

    boot();
  </script>
</body>
</html>
